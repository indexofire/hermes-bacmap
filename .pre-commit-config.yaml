repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--check]
        files: ^(src|tests)/
      - id: ruff-format
        args: [--check]
        files: ^(src|tests)/

  # NOTE: mypy 不在 pre-commit 中运行——隔离环境缺少 biopython/pyrodigal/mappy 等
  # 重依赖导致分析失真(unreachable/unused-ignore 误报)。类型门禁由 CI 的
  # typecheck job 承担(mypy --strict,完整依赖环境)。

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]
        files: '\.md$'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^(data/|.*\.lock$|pixi\.lock$|uv\.lock$)
