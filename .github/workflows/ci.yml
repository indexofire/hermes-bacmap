name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.5"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "mypy>=1.10" "pydantic>=2.0" biopython types-python-dateutil
      - run: pip install -e .
      - run: mypy --strict src/hermes_bacmap/

  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "pytest>=8.0" "pytest-cov>=4.0" "pydantic>=2.0" biopython httpx
      - run: pip install -e ".[web]"
      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ tests/test_env.py \
            --cov=src/hermes_bacmap \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-branch \
            -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  snakemake-dag:
    name: Snakemake DAG dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "snakemake==7.32.*" "pulp<2.8" pandas
      - name: Create dummy input reads (dry-run does not read contents)
        run: |
          # samples.tsv has mixed CRLF/LF endings — strip \r from paths
          while IFS=$'\t' read -r sample species r1 r2; do
            [ "$sample" = "sample" ] && continue
            r1="${r1%$'\r'}"; r2="${r2%$'\r'}"
            mkdir -p "$(dirname "$r1")"
            : | gzip > "$r1"
            : | gzip > "$r2"
          done < workflows/bacmap/config/samples.tsv
      - name: Build DAG (dry-run)
        working-directory: workflows/bacmap
        run: snakemake -n --quiet --cores 1

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  security-scan:
    name: Dependency security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit --strict

  changelog-check:
    name: CHANGELOG updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md is modified
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^CHANGELOG.md$"; then
            echo "✓ CHANGELOG.md updated"
          else
            echo "✗ CHANGELOG.md must be updated (see project.md §12.6)"
            exit 1
          fi
